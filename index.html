<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Swagger UI</title>
  <link rel="stylesheet" href="./src/css/swagger-ui.css" />
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
    }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>

  <script src="./src/js/swagger-ui-bundle.js"></script>
  <script src="./src/js/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      SwaggerUIBundle({
        url: "/openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout"
      });
    };
  </script>
</body>
</html>
